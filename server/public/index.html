<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Q&A — RAG Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5; color: #1a1a1a;
      display: flex; justify-content: center; padding: 2rem;
    }
    .container { max-width: 720px; width: 100%; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    .card {
      background: #fff; border-radius: 12px; padding: 1.5rem;
      box-shadow: 0 1px 3px rgba(0,0,0,.1); margin-bottom: 1.25rem;
    }
    label { font-weight: 600; display: block; margin-bottom: .5rem; }
    input[type="file"] { margin-bottom: .75rem; }
    button {
      background: #2563eb; color: #fff; border: none; border-radius: 8px;
      padding: .6rem 1.25rem; font-size: .9rem; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    textarea {
      width: 100%; border: 1px solid #d1d5db; border-radius: 8px;
      padding: .6rem; font-size: .95rem; resize: vertical; min-height: 60px;
    }
    .status {
      margin-top: .75rem; padding: .6rem; border-radius: 8px;
      font-size: .85rem; display: none;
    }
    .status.success { display: block; background: #dcfce7; color: #166534; }
    .status.error { display: block; background: #fee2e2; color: #991b1b; }
    .status.loading { display: block; background: #e0e7ff; color: #3730a3; }
    .answer-box {
      margin-top: 1rem; white-space: pre-wrap; line-height: 1.6;
    }
    .sources { margin-top: 1rem; font-size: .8rem; color: #555; }
    .sources summary { cursor: pointer; font-weight: 600; }
    .source-item {
      background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 6px;
      padding: .5rem; margin-top: .4rem; font-family: monospace; font-size: .75rem;
    }
    .ask-row { display: flex; gap: .5rem; }
    .ask-row textarea { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF Q&A — RAG Demo</h1>

    <!-- Upload -->
    <div class="card">
      <label for="pdf">1. Upload a PDF</label>
      <input type="file" id="pdf" accept=".pdf" />
      <button id="uploadBtn" onclick="uploadPDF()">Upload &amp; Ingest</button>
      <div id="uploadStatus" class="status"></div>
    </div>

    <!-- Ask -->
    <div class="card">
      <label for="question">2. Ask a question</label>
      <div class="ask-row">
        <textarea id="question" placeholder="What is this document about?" rows="2"></textarea>
        <button id="askBtn" onclick="askQuestion()">Ask</button>
      </div>
      <div id="askStatus" class="status"></div>
      <div id="answerBox" class="answer-box"></div>
      <details id="sourcesBox" class="sources" style="display:none">
        <summary>Retrieved chunks</summary>
        <div id="sourcesList"></div>
      </details>
    </div>
  </div>

  <script>
    async function uploadPDF() {
      const fileInput = document.getElementById("pdf");
      const status = document.getElementById("uploadStatus");
      const btn = document.getElementById("uploadBtn");

      if (!fileInput.files.length) {
        status.className = "status error";
        status.textContent = "Please select a PDF file.";
        return;
      }

      const form = new FormData();
      form.append("pdf", fileInput.files[0]);

      btn.disabled = true;
      status.className = "status loading";
      status.textContent = "Uploading and processing…";

      try {
        const res = await fetch("/api/upload", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        status.className = "status success";
        status.textContent = `Done — ${data.pages} pages, ${data.chunks} chunks indexed.`;
      } catch (err) {
        status.className = "status error";
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
      }
    }

    async function askQuestion() {
      const question = document.getElementById("question").value.trim();
      const status = document.getElementById("askStatus");
      const answerBox = document.getElementById("answerBox");
      const sourcesBox = document.getElementById("sourcesBox");
      const sourcesList = document.getElementById("sourcesList");
      const btn = document.getElementById("askBtn");

      if (!question) {
        status.className = "status error";
        status.textContent = "Type a question first.";
        return;
      }

      btn.disabled = true;
      status.className = "status loading";
      status.textContent = "Thinking…";
      answerBox.textContent = "";
      sourcesBox.style.display = "none";

      try {
        const res = await fetch("/api/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        status.className = "status success";
        status.textContent = "Answer:";
        answerBox.textContent = data.answer;

        if (data.sources?.length) {
          sourcesBox.style.display = "block";
          sourcesList.innerHTML = data.sources
            .map(
              (s) =>
                `<div class="source-item"><strong>Score:</strong> ${s.score}<br/>${s.text}</div>`
            )
            .join("");
        }
      } catch (err) {
        status.className = "status error";
        status.textContent = err.message;
        answerBox.textContent = "";
      } finally {
        btn.disabled = false;
      }
    }

    // Allow Enter to submit question
    document.getElementById("question").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        askQuestion();
      }
    });
  </script>
</body>
</html>
